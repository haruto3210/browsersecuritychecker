<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブラウザ セキュリティ診断 ALL-IN-ONE PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: dark;
    --ok:#4caf50; --warn:#ef5350; --mid:#ffca28;
    --bg:#050608; --panel:#11141f; --panel2:#181c29;
    --text:#e0e0e0; --muted:#9e9e9e; --accent:#40c4ff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:16px;
    background:radial-gradient(circle at top,#1a237e 0,#050608 55%);
    color:var(--text);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .wrap{max-width:1040px;margin:0 auto;}
  header{
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
    margin-bottom:16px;
  }
  .title-block h1{margin:0;font-size:1.7rem;}
  .title-block p{margin:4px 0 0;font-size:.85rem;color:var(--muted);}
  .chip{
    padding:4px 10px;border-radius:999px;
    border:1px solid rgba(255,255,255,.18);
    font-size:.75rem;color:var(--muted);
    backdrop-filter:blur(10px);
  }
  .grid{
    display:grid;
    grid-template-columns:minmax(0,2fr) minmax(0,1.4fr);
    gap:14px;
  }
  @media(max-width:900px){
    .grid{grid-template-columns:1fr;}
  }
  .panel{
    background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(0,0,0,.6));
    border-radius:14px;
    padding:14px 14px 12px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 18px 40px rgba(0,0,0,.6);
  }
  .panel h2{
    margin:0 0 8px;
    font-size:1rem;
    display:flex;align-items:center;gap:6px;
  }
  .panel h2 span.icon{
    width:18px;height:18px;border-radius:6px;
    background:rgba(64,196,255,.18);
    display:inline-flex;align-items:center;justify-content:center;
    font-size:.8rem;
  }
  .sub{
    font-size:.8rem;color:var(--muted);margin-bottom:8px;
  }
  .btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
  button{
    padding:8px 16px;border-radius:999px;border:none;
    background:linear-gradient(135deg,#00e5ff,#00c853);
    color:#000;font-weight:600;font-size:.85rem;
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  }
  button.secondary{
    background:transparent;
    color:var(--accent);
    border:1px solid rgba(64,196,255,.6);
  }
  button:disabled{
    opacity:.5;cursor:default;
  }
  .badge{
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 9px;border-radius:999px;
    margin:3px 3px 3px 0;
    font-size:.75rem;border:1px solid rgba(255,255,255,.12);
    background:rgba(0,0,0,.35);
  }
  .ok{color:var(--ok);border-color:rgba(76,175,80,.7);}
  .warn{color:var(--warn);border-color:rgba(239,83,80,.7);}
  .mid{color:var(--mid);border-color:rgba(255,202,40,.7);}
  .badge-label{font-weight:600;font-size:.7rem;opacity:.8;}
  .result{margin-top:6px;font-size:.85rem;}
  ul{margin:6px 0 0 18px;font-size:.8rem;color:var(--muted);}
  pre{
    white-space:pre-wrap;word-break:break-all;
    font-size:.75rem;
    background:rgba(0,0,0,.55);
    padding:8px;border-radius:8px;
    border:1px solid rgba(255,255,255,.08);
  }
  .ext-item{
    margin:6px 0;
    padding:8px 9px;
    background:var(--panel2);
    border-radius:8px;
    border:1px solid rgba(255,255,255,.12);
    font-size:.8rem;
  }
  .ext-item-header{
    display:flex;justify-content:space-between;align-items:center;
    gap:6px;margin-bottom:2px;
  }
  .ext-name{font-weight:600;font-size:.85rem;}
  .ext-tag{
    font-size:.7rem;
    padding:2px 7px;border-radius:999px;
    border:1px solid rgba(255,255,255,.18);
    color:var(--muted);
  }
  .ext-item a{color:var(--accent);text-decoration:none;font-size:.8rem;}
  .pill-row{
    display:flex;flex-wrap:wrap;gap:6px;
    margin-top:4px;font-size:.7rem;
  }
  .pill{
    padding:2px 7px;border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    color:var(--muted);
  }
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="title-block">
    <h1>ブラウザ セキュリティ診断 ALL-IN-ONE PRO</h1>
    <p>WebGL / Canvas / Audio 指紋・WebRTC・DoH・IPv6・Proxy 推定・拡張機能レコメンド・レポート出力</p>
  </div>
  <div class="chip" id="envChip">環境: 解析中…</div>
</header>

<div class="grid">
  <div class="panel">
    <h2><span class="icon">⚙</span>自動診断</h2>
    <p class="sub">ブラウザで取得可能な情報をまとめてチェックし、セキュリティ状態を可視化します。</p>
    <div class="btn-row">
      <button id="runBtn" onclick="runAll()">
        <span>すべて診断する</span>
      </button>
      <button class="secondary" onclick="downloadReport()">
        レポートをテキストで保存
      </button>
    </div>
    <div id="result" class="result"></div>

    <h2><span class="icon">💡</span>改善ポイント（自動コメント）</h2>
    <div id="advice" class="result"></div>

    <h2><span class="icon">🧩</span>推奨セキュリティ拡張機能（自動判定）</h2>
    <div id="extensions" class="result"></div>
  </div>

  <div class="panel">
    <h2><span class="icon">📊</span>生データ / 環境情報</h2>
    <p class="sub">診断結果の生データ。バグ調査や共有用にテキストとして保存できます。</p>
    <pre id="raw">まだ診断は実行されていません。</pre>
  </div>
</div>

<script>
let lastReportText = "";
let envInfo = {browser:"Unknown", os:"Unknown"};

// --- 環境判定（ブラウザ / OS） ---
function detectEnv(){
  const ua = navigator.userAgent;
  let browser = "Unknown";
  if(/Edg\//.test(ua)) browser = "Edge";
  else if(/Firefox\//.test(ua)) browser = "Firefox";
  else if(/Chrome\//.test(ua)) browser = "Chrome";
  else if(/Safari\//.test(ua)) browser = "Safari";

  let os = "Unknown";
  if(/Windows NT/.test(ua)) os = "Windows";
  else if(/Android/.test(ua)) os = "Android";
  else if(/Mac OS X/.test(ua)) os = "macOS";
  else if(/Linux/.test(ua)) os = "Linux";
  else if(/iPhone|iPad|iPod/.test(ua)) os = "iOS";

  envInfo = {browser, os};
  const chip = document.getElementById("envChip");
  chip.textContent = `環境: ${browser} / ${os}`;
}
detectEnv();

// --- UI ヘルパ ---
function badge(label, value, type){
  return `<span class="badge ${type}">
    <span class="badge-label">${label}</span>
    <span>${value}</span>
  </span>`;
}

// --- 各種チェック ---
async function checkWebRTC(){
  return new Promise(resolve=>{
    try{
      const pc=new RTCPeerConnection({iceServers:[]});
      pc.createDataChannel("x");
      pc.createOffer().then(o=>pc.setLocalDescription(o));
      const ips=new Set();
      pc.onicecandidate=e=>{
        if(!e||!e.candidate){
          pc.close();
          resolve(Array.from(ips));
          return;
        }
        const m=e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
        if(m) ips.add(m[0]);
      };
    }catch(e){resolve(["取得不可"]); }
  });
}

async function checkSpeed(){
  const start=performance.now();
  try{
    await fetch("https://speed.cloudflare.com/__down?bytes=1000000",{cache:"no-store"});
    const sec=(performance.now()-start)/1000;
    const mbps=(1/sec).toFixed(2);
    return mbps;
  }catch(e){return null;}
}

async function checkDoH(){
  try{
    const r=await fetch("https://cloudflare-dns.com/dns-query?name=example.com&type=A",{
      method:"GET",
      headers:{ "accept":"application/dns-json" }
    });
    return r.ok;
  }catch(e){return false;}
}

async function checkUblock(){
  return new Promise(resolve=>{
    try{
      const iframe=document.createElement("iframe");
      iframe.style.display="none";
      iframe.src="https://ads.example.com/banner.js";
      document.body.appendChild(iframe);
      setTimeout(()=>{
        if(!iframe.contentWindow || iframe.contentWindow.length===0){
          resolve(true);
        }else{
          resolve(false);
        }
        iframe.remove();
      },800);
    }catch(e){resolve(false);}
  });
}

async function checkEdgeSettings(){
  let cookieTest="unknown";
  try{
    document.cookie="__test_cookie=1; SameSite=None; Secure";
    cookieTest=document.cookie.includes("__test_cookie=")?"allow":"restrict";
  }catch(e){cookieTest="restrict";}
  return cookieTest;
}

function checkWebGL(){
  try{
    const canvas=document.createElement("canvas");
    const gl=canvas.getContext("webgl")||canvas.getContext("experimental-webgl");
    if(!gl) return {fp:"なし",vendor:"取得不可",renderer:"取得不可"};
    const ext=gl.getExtension("WEBGL_debug_renderer_info");
    const vendor=ext?gl.getParameter(ext.UNMASKED_VENDOR_WEBGL):"不明";
    const renderer=ext?gl.getParameter(ext.UNMASKED_RENDERER_WEBGL):"不明";
    const data=gl.getSupportedExtensions().join(",");
    let hash=0;
    for(let i=0;i<data.length;i++){hash=((hash<<5)-hash)+data.charCodeAt(i);hash|=0;}
    return {fp:String(hash),vendor,renderer};
  }catch(e){
    return {fp:"エラー",vendor:"取得不可",renderer:"取得不可"};
  }
}

function checkCanvasFP(){
  try{
    const c=document.createElement("canvas");
    c.width=200;c.height=50;
    const ctx=c.getContext("2d");
    ctx.textBaseline="top";
    ctx.font="16px 'Arial'";
    ctx.fillStyle="#f60";
    ctx.fillRect(0,0,200,50);
    ctx.fillStyle="#069";
    ctx.fillText("fingerprint-test-ALL",2,2);
    const data=c.toDataURL();
    let hash=0;
    for(let i=0;i<data.length;i++){hash=((hash<<5)-hash)+data.charCodeAt(i);hash|=0;}
    return String(hash);
  }catch(e){return "エラー";}
}

async function checkAudioFP(){
  try{
    const C = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    if(!C) return "未対応";
    const ctx=new C(1,44100,44100);
    const osc=ctx.createOscillator();
    const comp=ctx.createDynamicsCompressor();
    osc.connect(comp);comp.connect(ctx.destination);
    osc.start(0);
    const buf=await ctx.startRendering();
    let sum=0;
    const ch=buf.getChannelData(0);
    for(let i=0;i<ch.length;i+=100){sum+=Math.abs(ch[i]);}
    return String(sum.toFixed(4));
  }catch(e){return "エラー";}
}

function checkStorage(){
  let ls=false,ss=false;
  try{localStorage.setItem("__t","1");ls=true;localStorage.removeItem("__t");}catch(e){}
  try{sessionStorage.setItem("__t","1");ss=true;sessionStorage.removeItem("__t");}catch(e){}
  return {ls,ss};
}

function checkAPIs(){
  const notif=("Notification" in window);
  const clip=!!(navigator.clipboard && navigator.clipboard.writeText);
  return {notif,clip};
}

async function checkIPv6(){
  try{
    await fetch("https://[2606:4700:4700::1111]/", {mode:"no-cors"});
    return true;
  }catch(e){return false;}
}

async function checkProxy(){
  return new Promise(resolve=>{
    try{
      const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
      pc.createDataChannel("x");
      pc.createOffer().then(o=>pc.setLocalDescription(o));
      let relay=false;
      pc.onicecandidate=e=>{
        if(!e||!e.candidate){
          pc.close();
          resolve(relay);
          return;
        }
        if(e.candidate.candidate.includes(" typ relay ")) relay=true;
      };
    }catch(e){resolve(false);}
  });
}

function checkMisc(){
  return {
    lang: navigator.language,
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "不明",
    screen: `${screen.width}x${screen.height} (${window.devicePixelRatio}x)`,
    secureContext: window.isSecureContext,
    sw: "serviceWorker" in navigator
  };
}

// --- 拡張機能リンク選択（ブラウザ / OS 切り替え） ---
function getExtensionLinks(){
  const b = envInfo.browser;
  const os = envInfo.os;

  const links = {
    ublock:{
      Chrome:"https://chrome.google.com/webstore/detail/ublock-origin/cjpalhdlnbpafiamejdnhcphjbkeiagm",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/ublock-origin/cjpalhdlnbpafiamejdnhcphjbkeiagm",
      Firefox:"https://addons.mozilla.org/firefox/addon/ublock-origin/"
    },
    mbg:{
      Chrome:"https://chrome.google.com/webstore/detail/malwarebytes-browser-guar/ihcjicgdanjaechkgeegckofjjedodee",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/malwarebytes-browser-guar/ihcjicgdanjaechkgeegckofjjedodee",
      Firefox:"https://addons.mozilla.org/firefox/addon/malwarebytes/"
    },
    webrtc:{
      Chrome:"https://chrome.google.com/webstore/detail/webrtc-control/fjkmabmdepjfammlpliljpnbhleegehm",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/webrtc-control/ejjicmeblgpmajnghnpcppodonldlgfn",
      Firefox:"https://addons.mozilla.org/firefox/addon/webrtc-control/"
    },
    bitwarden:{
      Chrome:"https://chrome.google.com/webstore/detail/bitwarden-free-password-m/nngceckbapebfimnlniiiahkandclblb",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/bitwarden-free-password-m/nngceckbapebfimnlniiiahkandclblb",
      Firefox:"https://addons.mozilla.org/firefox/addon/bitwarden-password-manager/"
    }
  };

  function pick(map){
    if(map[b]) return map[b];
    if(map.Chrome) return map.Chrome;
    return Object.values(map)[0];
  }

  return {
    os,
    browser:b,
    ublock: pick(links.ublock),
    mbg: pick(links.mbg),
    webrtc: pick(links.webrtc),
    bitwarden: pick(links.bitwarden)
  };
}

// --- 総合診断 ---
async function runAll(){
  const runBtn = document.getElementById("runBtn");
  runBtn.disabled = true;
  runBtn.textContent = "診断中…";

  const out=document.getElementById("result");
  const advice=document.getElementById("advice");
  const ext=document.getElementById("extensions");
  const raw=document.getElementById("raw");

  out.innerHTML="診断中…";
  advice.innerHTML="";
  ext.innerHTML="";
  raw.textContent="";

  const ua=navigator.userAgent;
  const https=location.protocol==="https:";
  const cpu=navigator.hardwareConcurrency;
  const ram=navigator.deviceMemory||"不明";
  const misc=checkMisc();

  const [
    webrtcIPs,speed,doh,ublock,edge,cWebGL,cCanvas,audioFP,
    storage,apis,ipv6,proxy
  ] = await Promise.all([
    checkWebRTC(),
    checkSpeed(),
    checkDoH(),
    checkUblock(),
    checkEdgeSettings(),
    Promise.resolve(checkWebGL()),
    Promise.resolve(checkCanvasFP()),
    checkAudioFP(),
    Promise.resolve(checkStorage()),
    Promise.resolve(checkAPIs()),
    checkIPv6(),
    checkProxy()
  ]);

  // 表示
  let html="";
  html+=https
    ? badge("HTTPS", "OK", "ok")
    : badge("HTTPS", "非HTTPS", "warn");
  html+=badge("UA", ua, "mid");
  html+=badge("CPU", cpu+" スレッド", "mid");
  html+=badge("RAM", ram+" GB", "mid");
  html+=badge("言語", misc.lang, "mid");
  html+=badge("TZ", misc.tz, "mid");
  html+=badge("画面", misc.screen, "mid");
  html+=badge("SecureContext", misc.secureContext?"YES":"NO", misc.secureContext?"ok":"warn");
  html+=badge("ServiceWorker", misc.sw?"対応":"未対応", "mid");
  html+=badge("WebRTC IP", webrtcIPs.join(", ")||"なし", "mid");
  html+=badge("速度", speed?speed+" Mbps":"測定不可", speed && speed>30?"ok":"mid");
  html+=badge("DoH", doh?"有効の可能性高い":"無効の可能性", doh?"ok":"mid");
  html+=badge("uBlock推定", ublock?"動作中の可能性高い":"無効/例外の可能性", ublock?"ok":"warn");
  html+=badge("Cookie挙動", edge, "mid");
  html+=badge("WebGL FP", cWebGL.fp, "mid");
  html+=badge("GPU", cWebGL.vendor+" / "+cWebGL.renderer, "mid");
  html+=badge("Canvas FP", cCanvas, "mid");
  html+=badge("Audio FP", audioFP, "mid");
  html+=badge("LocalStorage", storage.ls?"OK":"NG", storage.ls?"ok":"warn");
  html+=badge("SessionStorage", storage.ss?"OK":"NG", storage.ss?"ok":"warn");
  html+=badge("Notification API", apis.notif?"利用可":"不可", "mid");
  html+=badge("Clipboard API", apis.clip?"利用可":"不可", "mid");
  html+=badge("IPv6", ipv6?"到達可能の可能性":"不可/不明", "mid");
  html+=badge("Proxy推定", proxy?"VPN/Proxy の可能性":"なし/不明", "mid");

  out.innerHTML=html;

  // 改善ポイント
  const tips=[];
  if(!https) tips.push("このページを HTTPS で配信すると SecureContext が有効になり、診断精度と安全性が向上します。");
  if(!doh) tips.push("ブラウザのセキュア DNS を 1.1.1.1 / 8.8.8.8 などに設定すると、DNS レベルの保護と速度が向上します。");
  if(!ublock) tips.push("uBlock Origin が無効か例外になっている可能性があります。拡張機能と「信頼済みサイト」を確認してください。");
  if(speed && speed<20) tips.push("通信速度がやや遅めです。大容量ダウンロードやゲーム時は有線接続や別回線も検討できます。");
  if(!ipv6) tips.push("IPv6 が無効な環境です。必須ではありませんが、有効化すると経路が最適化される場合があります。");
  if(!storage.ls || !storage.ss) tips.push("LocalStorage / SessionStorage が無効だと、一部サイトのログイン保持や設定保存が動作しない可能性があります。");
  if(!misc.secureContext) tips.push("SecureContext ではないため、一部のセキュア API が制限されます。HTTPS 環境での利用を推奨します。");

  advice.innerHTML = tips.length===0
    ? "<span class='badge ok'><span class='badge-label'>診断</span><span>大きな問題は見当たりません。かなり整った環境です。</span></span>"
    : "<ul>"+tips.map(t=>"<li>"+t+"</li>").join("")+"</ul>";

  // 拡張機能レコメンド（ブラウザ / OS 切り替え + 疑似インストール判定）
  const links = getExtensionLinks();
  const rec = [];

  // uBlock Origin
  rec.push({
    key:"ublock",
    name:"uBlock Origin",
    desc:"広告・トラッカー・悪質サイトを強力にブロックする定番コンテンツブロッカー。",
    url:links.ublock,
    needed:!ublock,
    installedGuess:ublock,
    reason: ublock ? "広告ブロックが機能している可能性が高い環境です。" : "広告ブロックが検出できなかったため、導入を強く推奨します。"
  });

  // Malwarebytes Browser Guard
  rec.push({
    key:"mbg",
    name:"Malwarebytes Browser Guard",
    desc:"フィッシング・マルウェア・詐欺サイトをブラウザレベルでブロック。",
    url:links.mbg,
    needed:!doh, // DoH 無効なら DNS/URL レベル保護を補完
    installedGuess:false,
    reason: doh ? "セキュア DNS が有効なため、DNS レベルの保護はある程度確保されています。" : "セキュア DNS が無効なため、URL レベルの保護を追加すると安全性が向上します。"
  });

  // WebRTC Control
  const webrtcLeak = webrtcIPs.filter(ip=>!/^10\.|^192\.168\.|^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(ip)).length>0;
  rec.push({
    key:"webrtc",
    name:"WebRTC Control",
    desc:"WebRTC によるグローバル IP アドレス漏洩を防止します。",
    url:links.webrtc,
    needed:webrtcLeak,
    installedGuess:!webrtcLeak,
    reason: webrtcLeak ? "WebRTC 経由でプライベート以外の IP が検出されたため、リーク防止拡張の導入を推奨します。" : "WebRTC から明確なグローバル IP は検出されませんでした。"
  });

  // Bitwarden
  rec.push({
    key:"bitwarden",
    name:"Bitwarden",
    desc:"オープンソースのパスワードマネージャー。強力なパスワード生成と自動入力に対応。",
    url:links.bitwarden,
    needed:!apis.clip, // かなりラフな疑似判定
    installedGuess:apis.clip,
    reason: apis.clip ? "クリップボード API が利用可能なため、パスワードマネージャーとの連携環境は整っている可能性があります。" : "パスワード管理がブラウザ任せの場合、専用マネージャーの導入を推奨します。"
  });

  const osTag = links.os;
  const brTag = links.browser;

  const recHtml = rec.map(r=>{
    const status = r.installedGuess
      ? "インストール済みの可能性"
      : (r.needed ? "導入推奨" : "任意");
    const statusClass = r.installedGuess ? "ok" : (r.needed ? "warn" : "mid");
    const osNote = (osTag==="Android" || osTag==="iOS")
      ? "※ 一部拡張機能は PC 版ブラウザ専用です。"
      : "";
    return `
      <div class="ext-item">
        <div class="ext-item-header">
          <div class="ext-name">${r.name}</div>
          <div class="ext-tag">${brTag} / ${osTag}</div>
        </div>
        <div>${r.desc}</div>
        <div class="pill-row">
          <span class="pill ${statusClass}">状態推定: ${status}</span>
          <span class="pill">${r.reason}</span>
          ${osNote ? `<span class="pill">${osNote}</span>` : ""}
        </div>
        <div style="margin-top:4px;">
          <a href="${r.url}" target="_blank">→ 対応ストアで開く</a>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("extensions").innerHTML = recHtml;

  // 生テキストレポート
  const report = {
    env: envInfo,
    https,
    ua,
    cpu,
    ram,
    misc,
    webrtcIPs,
    speedMbps: speed,
    doh,
    ublock,
    edgeCookieBehavior: edge,
    webglFP: cWebGL,
    canvasFP: cCanvas,
    audioFP,
    storage,
    apis,
    ipv6,
    proxy,
    recommendations: rec.map(r=>({
      key:r.key,
      name:r.name,
      needed:r.needed,
      installedGuess:r.installedGuess,
      url:r.url
    }))
  };

  const textLines = [];
  textLines.push("=== Browser Security Report ===");
  for(const [k,v] of Object.entries(report)){
    textLines.push(k + ": " + JSON.stringify(v));
  }
  const adviceText = tips.length===0 ? "No major issues detected." : tips.map((t,i)=>`${i+1}. ${t}`).join("\n");
  textLines.push("\n=== Advice ===");
  textLines.push(adviceText);

  const finalText = textLines.join("\n");
  raw.textContent = finalText;
  lastReportText = finalText;

  runBtn.disabled = false;
  runBtn.textContent = "すべて診断する";
}

// --- レポートダウンロード ---
function downloadReport(){
  if(!lastReportText){
    alert("先に「すべて診断する」を押してください。");
    return;
  }
  const blob = new Blob([lastReportText], {type:"text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().replace(/[:.]/g,"-");
  a.href = url;
  a.download = "browser-security-report-" + ts + ".txt";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
</script>

</div>
