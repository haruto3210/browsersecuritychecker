<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブラウザ セキュリティ診断 ALL-IN-ONE PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: dark;
    --ok:#4caf50; --warn:#ef5350; --mid:#ffca28;
    --bg:#050608; --panel:#11141f; --panel2:#181c29;
    --text:#e0e0e0; --muted:#9e9e9e; --accent:#40c4ff;
  }
  body{
    margin:0; padding:16px;
    background:radial-gradient(circle at top,#1a237e 0,#050608 55%);
    color:var(--text);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .wrap{max-width:1040px;margin:0 auto;}
  header{
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
    margin-bottom:16px;
  }
  .title-block h1{margin:0;font-size:1.7rem;}
  .chip{
    padding:4px 10px;border-radius:999px;
    border:1px solid rgba(255,255,255,.18);
    font-size:.75rem;color:var(--muted);
  }
  .panel{
    background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(0,0,0,.6));
    border-radius:14px;
    padding:14px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 18px 40px rgba(0,0,0,.6);
    margin-bottom:16px;
  }
  button{
    padding:8px 16px;border-radius:999px;border:none;
    background:linear-gradient(135deg,#00e5ff,#00c853);
    color:#000;font-weight:600;font-size:.85rem;
    cursor:pointer;
  }
  button.secondary{
    background:transparent;
    color:var(--accent);
    border:1px solid rgba(64,196,255,.6);
  }
  .progress-bg{
    width:100%;height:12px;border-radius:6px;
    background:rgba(255,255,255,.15);
    margin-top:10px;
  }
  .progress-bar{
    height:12px;border-radius:6px;
    width:0%;
    transition:width .25s cubic-bezier(.4,0,.2,1);
  }
  .progress-text{
    margin-top:6px;font-size:.85rem;color:var(--muted);
  }
  .ext-item{
    margin:6px 0;padding:8px;
    background:var(--panel2);
    border-radius:8px;
    border:1px solid rgba(255,255,255,.12);
  }
  .history-item{
    padding:8px;margin:6px 0;
    background:rgba(255,255,255,.05);
    border-radius:8px;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="title-block">
    <h1>ブラウザ セキュリティ診断 ALL-IN-ONE PRO</h1>
  </div>
  <div class="chip" id="envChip">環境: 解析中…</div>
</header>

<div class="panel">
  <h2>自動診断</h2>
  <button id="runBtn" onclick="runAll()">すべて診断する</button>
  <button class="secondary" onclick="downloadReport()">レポート保存</button>

  <div id="progressArea"></div>
  <div id="result"></div>
  <div id="advice"></div>
  <div id="extensions"></div>

  <button id="openReportBtn" style="display:none;margin-top:10px;" onclick="scrollToReport()">
    診断レポートを開く
  </button>
</div>

<div class="panel">
  <h2>診断履歴</h2>
  <div id="historyList">まだ履歴はありません。</div>
</div>

<div class="panel">
  <h2>生データ</h2>
  <pre id="raw">まだ診断は実行されていません。</pre>
</div>

<script>
let lastReportText = "";
let envInfo = {browser:"Unknown", os:"Unknown"};

function detectEnv(){
  const ua = navigator.userAgent;
  let browser="Unknown";
  if(/Edg\//.test(ua)) browser="Edge";
  else if(/Firefox\//.test(ua)) browser="Firefox";
  else if(/Chrome\//.test(ua)) browser="Chrome";

  let os="Unknown";
  if(/Windows NT/.test(ua)) os="Windows";
  else if(/Android/.test(ua)) os="Android";
  else if(/Mac OS X/.test(ua)) os="macOS";
  else if(/Linux/.test(ua)) os="Linux";

  envInfo={browser,os};
  document.getElementById("envChip").textContent=`環境: ${browser} / ${os}`;
}
detectEnv();
/* ===========================
   拡張機能リンク（Chrome / Edge / Firefox 自動切替）
=========================== */
function getExtensionLinks(){
  const b = envInfo.browser;

  const links = {
    ublock:{
      Chrome:"https://chrome.google.com/webstore/detail/ublock-origin/cjpalhdlnbpafiamejdnhcphjbkeiagm",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/ublock-origin/cjpalhdlnbpafiamejdnhcphjbkeiagm",
      Firefox:"https://addons.mozilla.org/firefox/addon/ublock-origin/"
    },
    mbg:{
      Chrome:"https://chrome.google.com/webstore/detail/malwarebytes-browser-guar/ihcjicgdanjaechkgeegckofjjedodee",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/malwarebytes-browser-guar/ihcjicgdanjaechkgeegckofjjedodee",
      Firefox:"https://addons.mozilla.org/firefox/addon/malwarebytes/"
    },
    webrtc:{
      Chrome:"https://chrome.google.com/webstore/detail/webrtc-control/fjkmabmdepjfammlpliljpnbhleegehm",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/webrtc-control/ejjicmeblgpmajnghnpcppodonldlgfn",
      Firefox:"https://addons.mozilla.org/firefox/addon/webrtc-control/"
    },
    bitwarden:{
      Chrome:"https://chrome.google.com/webstore/detail/bitwarden-free-password-m/nngceckbapebfimnlniiiahkandclblb",
      Edge:"https://microsoftedge.microsoft.com/addons/detail/bitwarden-free-password-m/nngceckbapebfimnlniiiahkandclblb",
      Firefox:"https://addons.mozilla.org/firefox/addon/bitwarden-password-manager/"
    }
  };

  function pick(map){
    return map[b] ?? map.Chrome;
  }

  return {
    ublock: pick(links.ublock),
    mbg: pick(links.mbg),
    webrtc: pick(links.webrtc),
    bitwarden: pick(links.bitwarden)
  };
}

/* ===========================
   診断履歴保存
=========================== */
function saveHistory(report){
  const list = JSON.parse(localStorage.getItem("diagHistory") || "[]");
  list.unshift({
    time: new Date().toLocaleString(),
    env: envInfo,
    summary: {
      speed: report.speedMbps,
      doh: report.doh,
      ipv6: report.ipv6,
      proxy: report.proxy
    },
    raw: lastReportText
  });
  while(list.length > 10) list.pop();
  localStorage.setItem("diagHistory", JSON.stringify(list));
  renderHistory();
}

function renderHistory(){
  const list = JSON.parse(localStorage.getItem("diagHistory") || "[]");
  const box = document.getElementById("historyList");

  if(list.length === 0){
    box.textContent = "まだ履歴はありません。";
    return;
  }

  box.innerHTML = list.map((h,i)=>`
    <div class="history-item" onclick="showHistory(${i})">
      <b>${h.time}</b><br>
      ${h.env.browser} / ${h.env.os}  
      — 速度:${h.summary.speed ?? "?"}Mbps / DoH:${h.summary.doh}
    </div>
  `).join("");
}

function showHistory(i){
  const list = JSON.parse(localStorage.getItem("diagHistory") || "[]");
  const h = list[i];
  document.getElementById("raw").textContent = h.raw;
  document.getElementById("openReportBtn").style.display = "block";
}

/* ===========================
   診断本体（進捗バー付き）
=========================== */
async function runAll(){
  const runBtn = document.getElementById("runBtn");
  runBtn.disabled = true;
  runBtn.textContent = "診断中…";

  const out=document.getElementById("result");
  const advice=document.getElementById("advice");
  const ext=document.getElementById("extensions");
  const raw=document.getElementById("raw");
  const progressArea=document.getElementById("progressArea");

  out.innerHTML="";
  advice.innerHTML="";
  ext.innerHTML="";
  raw.textContent="";
  progressArea.innerHTML="";

  /* --- 進捗バー UI --- */
  const barBg = document.createElement("div");
  barBg.className = "progress-bg";

  const bar = document.createElement("div");
  bar.className = "progress-bar";
  barBg.appendChild(bar);

  const text = document.createElement("div");
  text.className = "progress-text";

  progressArea.appendChild(barBg);
  progressArea.appendChild(text);

  /* --- タスク一覧（色付き） --- */
  const tasks = [
    {name:"WebRTC チェック", fn:checkWebRTC, color:"#40c4ff"},
    {name:"通信速度", fn:checkSpeed, color:"#00e676"},
    {name:"DoH", fn:checkDoH, color:"#00e676"},
    {name:"uBlock 判定", fn:checkUblock, color:"#ffca28"},
    {name:"Cookie 挙動", fn:checkEdgeSettings, color:"#ffca28"},
    {name:"WebGL 指紋", fn:()=>Promise.resolve(checkWebGL()), color:"#b388ff"},
    {name:"Canvas 指紋", fn:()=>Promise.resolve(checkCanvasFP()), color:"#b388ff"},
    {name:"Audio 指紋", fn:checkAudioFP, color:"#b388ff"},
    {name:"Storage", fn:()=>Promise.resolve(checkStorage()), color:"#ffeb3b"},
    {name:"API 状態", fn:()=>Promise.resolve(checkAPIs()), color:"#ffeb3b"},
    {name:"IPv6", fn:checkIPv6, color:"#40c4ff"},
    {name:"Proxy 推定", fn:checkProxy, color:"#ef5350"}
  ];

  const total = tasks.length;
  let done = 0;
  const start = performance.now();
  const results = {};

  /* --- 順番に実行しながら進捗更新 --- */
  for(const t of tasks){
    text.textContent = `実行中: ${t.name} (${done}/${total})`;
    bar.style.background = t.color;

    const r = await t.fn();
    results[t.name] = r;

    done++;
    const percent = Math.floor(done / total * 100);
    bar.style.width = percent + "%";

    const elapsed = (performance.now() - start) / 1000;
    const avg = elapsed / done;
    const remain = avg * (total - done);

    text.textContent =
      `実行中: ${t.name} (${done}/${total}) — 残り約 ${remain.toFixed(1)} 秒`;
  }

  /* --- 完了表示 --- */
  bar.style.width = "100%";
  bar.style.background = "#00e676";
  text.textContent = "診断完了";

  /* --- ここから既存の結果生成ロジック（省略） --- */
  /* 晴人の既存 runAll の後半部分をここに戻すだけでOK */

  /* --- 診断履歴保存 --- */
  saveHistory({
    speedMbps: results["通信速度"],
    doh: results["DoH"],
    ipv6: results["IPv6"],
    proxy: results["Proxy 推定"]
  });

  /* --- レポートボタン表示 --- */
  document.getElementById("openReportBtn").style.display = "block";

  runBtn.disabled = false;
  runBtn.textContent = "すべて診断する";
}

/* ===========================
   レポートへスクロール
=========================== */
function scrollToReport(){
  document.getElementById("raw").scrollIntoView({behavior:"smooth"});
}

/* ===========================
   レポート保存
=========================== */
function downloadReport(){
  if(!lastReportText){
    alert("先に診断を実行してください。");
    return;
  }
  const blob = new Blob([lastReportText], {type:"text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "browser-security-report.txt";
  a.click();
  URL.revokeObjectURL(url);
}

/* ===========================
   初期化
=========================== */
renderHistory();
</script>

</div>
</body>
</html>
