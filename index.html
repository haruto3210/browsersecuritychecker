<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブラウザ セキュリティ診断 ALL-IN-ONE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: dark;
    --ok:#66bb6a; --warn:#ef5350; --mid:#ffca28;
    --panel:#151821; --text:#e0e0e0; --muted:#9e9e9e;
  }
  body {
    margin:0; padding:16px;
    background:#050608; color:var(--text);
    font-family:system-ui,sans-serif;
  }
  .wrap { max-width:980px; margin:0 auto; }
  h1 { font-size:1.6rem; margin-bottom:8px; }
  h2 { font-size:1.1rem; margin:18px 0 8px; border-left:4px solid #4fc3f7; padding-left:8px; }
  .panel {
    background:rgba(255,255,255,.05);
    border-radius:10px; padding:14px; margin-bottom:14px;
    border:1px solid rgba(255,255,255,.08);
  }
  .badge {
    display:inline-block; padding:4px 8px; border-radius:999px;
    margin:4px; font-size:.8rem; border:1px solid rgba(255,255,255,.1);
  }
  .ok{color:var(--ok);border-color:var(--ok);}
  .warn{color:var(--warn);border-color:var(--warn);}
  .mid{color:var(--mid);border-color:var(--mid);}
  button {
    padding:8px 16px; border-radius:999px; border:none;
    background:linear-gradient(135deg,#00e5ff,#00c853);
    color:#000; font-weight:600; cursor:pointer; margin-top:8px; margin-right:8px;
  }
  .result { margin-top:10px; font-size:.9rem; }
  pre {
    white-space:pre-wrap;
    word-break:break-all;
    font-size:.8rem;
    background:rgba(0,0,0,.4);
    padding:8px;
    border-radius:6px;
  }
  .ext-item {
    margin:6px 0;
    padding:8px;
    background:rgba(255,255,255,.05);
    border-radius:6px;
    border:1px solid rgba(255,255,255,.1);
  }
  .ext-item a { color:#4fc3f7; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">

<h1>ブラウザ セキュリティ診断 ALL-IN-ONE</h1>

<div class="panel">
  <h2>自動診断</h2>
  <button onclick="runAll()">すべて診断する</button>
  <button onclick="downloadReport()">結果をテキストでダウンロード</button>
  <div id="result" class="result"></div>

  <h2>改善ポイント（自動コメント）</h2>
  <div id="advice" class="result"></div>

  <h2>推奨セキュリティ拡張機能（自動判定）</h2>
  <div id="extensions" class="result"></div>

  <h2>生データ（テキスト）</h2>
  <pre id="raw"></pre>
</div>

<script>
let lastReportText = "";

// バッジ生成
function badge(text,type){return `<span class="badge ${type}">${text}</span>`;}

// WebRTCリーク
async function checkWebRTC(){
  return new Promise(resolve=>{
    try{
      const pc=new RTCPeerConnection({iceServers:[]});
      pc.createDataChannel("x");
      pc.createOffer().then(o=>pc.setLocalDescription(o));
      const ips=new Set();
      pc.onicecandidate=e=>{
        if(!e||!e.candidate){
          pc.close();
          resolve(Array.from(ips));
          return;
        }
        const m=e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
        if(m) ips.add(m[0]);
      };
    }catch(e){resolve(["取得不可"]); }
  });
}

// 通信速度
async function checkSpeed(){
  const start=performance.now();
  try{
    await fetch("https://speed.cloudflare.com/__down?bytes=1000000",{cache:"no-store"});
    const sec=(performance.now()-start)/1000;
    const mbps=(1/sec).toFixed(2);
    return mbps;
  }catch(e){return null;}
}

// DoH推定
async function checkDoH(){
  try{
    const r=await fetch("https://cloudflare-dns.com/dns-query?name=example.com&type=A",{
      method:"GET",
      headers:{ "accept":"application/dns-json" }
    });
    return r.ok;
  }catch(e){return false;}
}

// uBlock間接判定
async function checkUblock(){
  return new Promise(resolve=>{
    try{
      const iframe=document.createElement("iframe");
      iframe.style.display="none";
      iframe.src="https://ads.example.com/banner.js";
      document.body.appendChild(iframe);
      setTimeout(()=>{
        if(!iframe.contentWindow || iframe.contentWindow.length===0){
          resolve(true);
        }else{
          resolve(false);
        }
        iframe.remove();
      },800);
    }catch(e){resolve(false);}
  });
}


// Edge設定推定
async function checkEdgeSettings(){
  let cookieTest="unknown";
  try{
    document.cookie="__test_cookie=1; SameSite=None; Secure";
    cookieTest=document.cookie.includes("__test_cookie=")?"allow":"restrict";
  }catch(e){cookieTest="restrict";}
  return cookieTest;
}

// WebGL Fingerprint + GPU詳細
function checkWebGL(){
  try{
    const canvas=document.createElement("canvas");
    const gl=canvas.getContext("webgl")||canvas.getContext("experimental-webgl");
    if(!gl) return {fp:"なし",vendor:"取得不可",renderer:"取得不可"};
    const ext=gl.getExtension("WEBGL_debug_renderer_info");
    const vendor=ext?gl.getParameter(ext.UNMASKED_VENDOR_WEBGL):"不明";
    const renderer=ext?gl.getParameter(ext.UNMASKED_RENDERER_WEBGL):"不明";
    const data=gl.getSupportedExtensions().join(",");
    let hash=0;
    for(let i=0;i<data.length;i++){hash=((hash<<5)-hash)+data.charCodeAt(i);hash|=0;}
    return {fp:String(hash),vendor,renderer};
  }catch(e){
    return {fp:"エラー",vendor:"取得不可",renderer:"取得不可"};
  }
}

// Canvas Fingerprint
function checkCanvasFP(){
  try{
    const c=document.createElement("canvas");
    c.width=200;c.height=50;
    const ctx=c.getContext("2d");
    ctx.textBaseline="top";
    ctx.font="16px 'Arial'";
    ctx.fillStyle="#f60";
    ctx.fillRect(0,0,200,50);
    ctx.fillStyle="#069";
    ctx.fillText("fingerprint-test-ALL",2,2);
    const data=c.toDataURL();
    let hash=0;
    for(let i=0;i<data.length;i++){hash=((hash<<5)-hash)+data.charCodeAt(i);hash|=0;}
    return String(hash);
  }catch(e){return "エラー";}
}

// Audio Fingerprint
async function checkAudioFP(){
  try{
    const C = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    if(!C) return "未対応";
    const ctx=new C(1,44100,44100);
    const osc=ctx.createOscillator();
    const comp=ctx.createDynamicsCompressor();
    osc.connect(comp);comp.connect(ctx.destination);
    osc.start(0);
    const buf=await ctx.startRendering();
    let sum=0;
    const ch=buf.getChannelData(0);
    for(let i=0;i<ch.length;i+=100){sum+=Math.abs(ch[i]);}
    return String(sum.toFixed(4));
  }catch(e){return "エラー";}
}

// LocalStorage / SessionStorage
function checkStorage(){
  let ls=false,ss=false;
  try{localStorage.setItem("__t","1");ls=true;localStorage.removeItem("__t");}catch(e){}
  try{sessionStorage.setItem("__t","1");ss=true;sessionStorage.removeItem("__t");}catch(e){}
  return {ls,ss};
}

// Notification / Clipboard
function checkAPIs(){
  const notif=("Notification" in window);
  const clip=!!(navigator.clipboard && navigator.clipboard.writeText);
  return {notif,clip};
}

// IPv6推定
async function checkIPv6(){
  try{
    await fetch("https://[2606:4700:4700::1111]/", {mode:"no-cors"});
    return true;
  }catch(e){return false;}
}

// Proxy推定
async function checkProxy(){
  return new Promise(resolve=>{
    try{
      const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
      pc.createDataChannel("x");
      pc.createOffer().then(o=>pc.setLocalDescription(o));
      let relay=false;
      pc.onicecandidate=e=>{
        if(!e||!e.candidate){
          pc.close();
          resolve(relay);
          return;
        }
        if(e.candidate.candidate.includes(" typ relay ")) relay=true;
      };
    }catch(e){resolve(false);}
  });
}

// Misc
function checkMisc(){
  return {
    lang: navigator.language,
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "不明",
    screen: `${screen.width}x${screen.height} (${window.devicePixelRatio}x)`,
    secureContext: window.isSecureContext,
    sw: "serviceWorker" in navigator
  };
}

// 総合診断
async function runAll(){
  const out=document.getElementById("result");
  const advice=document.getElementById("advice");
  const ext=document.getElementById("extensions");
  const raw=document.getElementById("raw");

  out.innerHTML="診断中…";
  advice.innerHTML="";
  ext.innerHTML="";
  raw.textContent="";

  const ua=navigator.userAgent;
  const https=location.protocol==="https:";
  const cpu=navigator.hardwareConcurrency;
  const ram=navigator.deviceMemory||"不明";
  const misc=checkMisc();

  const [
    webrtcIPs,speed,doh,ublock,edge,cWebGL,cCanvas,audioFP,
    storage,apis,ipv6,proxy
  ] = await Promise.all([
    checkWebRTC(),
    checkSpeed(),
    checkDoH(),
    checkUblock(),
    checkEdgeSettings(),
    Promise.resolve(checkWebGL()),
    Promise.resolve(checkCanvasFP()),
    checkAudioFP(),
    Promise.resolve(checkStorage()),
    Promise.resolve(checkAPIs()),
    checkIPv6(),
    checkProxy()
  ]);

  // 表示
  let html="";
  html+=https?badge("HTTPS: OK","ok"):badge("HTTPS: 非HTTPS","warn");
  html+=badge("UA: "+ua,"mid");
  html+=badge("CPU: "+cpu,"mid");
  html+=badge("RAM: "+ram+"GB","mid");
  html+=badge("言語: "+misc.lang,"mid");
  html+=badge("TZ: "+misc.tz,"mid");
  html+=badge("画面: "+misc.screen,"mid");
  html+=badge("SecureContext: "+(misc.secureContext?"YES":"NO"), misc.secureContext?"ok":"warn");
  html+=badge("SW: "+(misc.sw?"YES":"NO"),"mid");
  html+=badge("WebRTC IP: "+webrtcIPs.join(", ") ,"mid");
  html+=badge("速度: "+(speed?speed+" Mbps":"測定不可"), speed && speed>30?"ok":"mid");
  html+=badge("DoH: "+(doh?"有効":"無効"), doh?"ok":"mid");
  html+=badge("uBlock: "+(ublock?"動作中":"無効/例外"), ublock?"ok":"warn");
  html+=badge("Cookie挙動: "+edge,"mid");
  html+=badge("WebGL FP: "+cWebGL.fp,"mid");
  html+=badge("GPU: "+cWebGL.vendor+" / "+cWebGL.renderer,"mid");
  html+=badge("Canvas FP: "+cCanvas,"mid");
  html+=badge("Audio FP: "+audioFP,"mid");
  html+=badge("LocalStorage: "+(storage.ls?"OK":"NG"), storage.ls?"ok":"warn");
  html+=badge("SessionStorage: "+(storage.ss?"OK":"NG"), storage.ss?"ok":"warn");
  html+=badge("Notification: "+(apis.notif?"OK":"NG"),"mid");
  html+=badge("Clipboard: "+(apis.clip?"OK":"NG"),"mid");
  html+=badge("IPv6: "+(ipv6?"到達":"不可"),"mid");
  html+=badge("Proxy推定: "+(proxy?"VPN/Proxyの可能性":"なし"),"mid");

  out.innerHTML=html;

  // 改善ポイント
  const tips=[];
  if(!https) tips.push("HTTPS で開くと SecureContext が有効になり、診断精度が上がる。");
  if(!doh) tips.push("セキュアDNS（1.1.1.1 など）を設定すると安全性と速度が向上する。");
  if(!ublock) tips.push("uBlock Origin が無効の可能性。拡張機能設定を確認するとよい。");
  if(speed && speed<20) tips.push("通信速度が遅め。Wi-Fi なら 5GHz や有線接続を検討できる。");
  if(!ipv6) tips.push("IPv6 が無効。必須ではないが、対応すると経路が最適化される場合がある。");
  if(!storage.ls || !storage.ss) tips.push("Storage が無効だとログイン保持が壊れる可能性がある。");

  advice.innerHTML = tips.length===0
    ? "<span class='badge ok'>大きな問題なし。非常に良い状態。</span>"
    : "<ul>"+tips.map(t=>"<li>"+t+"</li>").join("")+"</ul>";

  // 拡張機能レコメンド
  const rec=[];

  if(!ublock){
    rec.push({
      name:"uBlock Origin",
      desc:"広告・追跡・詐欺サイトを強力にブロック",
      url:"https://microsoftedge.microsoft.com/addons/detail/ublock-origin/cjpalhdlnbpafiamejdnhcphjbkeiagm"
    });
  }

  if(!doh){
    rec.push({
      name:"Malwarebytes Browser Guard",
      desc:"フィッシング・マルウェアサイトを自動ブロック",
      url:"https://microsoftedge.microsoft.com/addons/detail/malwarebytes-browser-guar/ihcjicgdanjaechkgeegckofjjedodee"
    });
  }

  if(webrtcIPs.length>1){
    rec.push({
      name:"WebRTC Leak Prevent",
      desc:"WebRTC による IP 漏洩を防止",
      url:"https://microsoftedge.microsoft.com/addons/detail/webrtc-leak-prevent/ejjicmeblgpmajnghnpcppodonldlgfn"
    });
  }

  if(!apis.clip){
    rec.push({
      name:"Bitwarden",
      desc:"安全なパスワード管理",
      url:"https://microsoftedge.microsoft.com/addons/detail/bitwarden-free-password-m/nngceckbapebfimnlniiiahkandclblb"
    });
  }

  if(rec.length===0){
    ext.innerHTML="<span class='badge ok'>追加で必要な拡張機能は特にありません。</span>";
  }else{
    ext.innerHTML = rec.map(r=>`
      <div class="ext-item">
        <b>${r.name}</b><br>
        ${r.desc}<br>
        <a href="${r.url}" target="_blank">→ 公式ストアで入手</a>
      </div>
    `).join("");
  }

  // 生テキストレポート
  const report = {
    https,
    ua,
    cpu,
    ram,
    misc,
    webrtcIPs,
    speed,
    doh,
    ublock,
    edge,
    cWebGL,
    cCanvas,
    audioFP,
    storage,
    apis,
    ipv6,
    proxy
  };

  const textLines = [];
  textLines.push("=== Browser Security Report ===");
  for(const [k,v] of Object.entries(report)){
    textLines.push(k + ": " + JSON.stringify(v));
  }

  const adviceText = tips.length===0 ? "No major issues detected." : tips.map((t,i)=>`${i+1}. ${t}`).join("\n");
  textLines.push("\n=== Advice ===");
  textLines.push(adviceText);

  const finalText = textLines.join("\n");
  raw.textContent = finalText;
  lastReportText = finalText;
}  // ← runAll() の正しい閉じカッコ（ここで終わり）

// ダウンロード
function downloadReport(){
  if(!lastReportText){
    alert("先に「すべて診断する」を押してください。");
    return;
  }
  const blob = new Blob([lastReportText], {type:"text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().replace(/[:.]/g,"-");
  a.href = url;
  a.download = "browser-security-report-" + ts + ".txt";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
</script>

</div>
</body>
</html>
