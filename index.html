<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブラウザ セキュリティ診断 PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: dark;
    --ok:#66bb6a; --warn:#ef5350; --mid:#ffca28;
    --panel:#151821; --text:#e0e0e0; --muted:#9e9e9e;
  }
  body {
    margin:0; padding:16px;
    background:#050608; color:var(--text);
    font-family:system-ui,sans-serif;
  }
  .wrap { max-width:900px; margin:0 auto; }
  h1 { font-size:1.6rem; margin-bottom:8px; }
  h2 { font-size:1.1rem; margin:18px 0 8px; border-left:4px solid #4fc3f7; padding-left:8px; }
  .panel {
    background:rgba(255,255,255,.05);
    border-radius:10px; padding:14px; margin-bottom:14px;
    border:1px solid rgba(255,255,255,.08);
  }
  .badge {
    display:inline-block; padding:4px 8px; border-radius:999px;
    margin:4px; font-size:.85rem; border:1px solid rgba(255,255,255,.1);
  }
  .ok{color:var(--ok);border-color:var(--ok);}
  .warn{color:var(--warn);border-color:var(--warn);}
  .mid{color:var(--mid);border-color:var(--mid);}
  button {
    padding:8px 16px; border-radius:999px; border:none;
    background:linear-gradient(135deg,#00e5ff,#00c853);
    color:#000; font-weight:600; cursor:pointer; margin-top:8px;
  }
  .result { margin-top:10px; font-size:.9rem; }
</style>
</head>
<body>
<div class="wrap">

<h1>ブラウザ セキュリティ診断 PRO</h1>

<div class="panel">
  <h2>自動診断</h2>
  <button onclick="runAll()">すべて診断する</button>
  <div id="result" class="result"></div>
</div>

<script>
// バッジ生成
function badge(text, type){ return `<span class="badge ${type}">${text}</span>`; }

// WebRTCリークチェック
async function checkWebRTC(){
  return new Promise(resolve=>{
    const pc=new RTCPeerConnection({iceServers:[]});
    pc.createDataChannel("x");
    pc.createOffer().then(o=>pc.setLocalDescription(o));
    pc.onicecandidate=e=>{
      if(!e||!e.candidate){
        resolve({local:"取得不可",public:"取得不可"});
        return;
      }
      const ip=e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
      if(ip) resolve({local:ip[0],public:"推定不可"});
      pc.close();
    };
  });
}

// 通信速度（実測）
async function checkSpeed(){
  const start=performance.now();
  try{
    await fetch("https://speed.cloudflare.com/__down?bytes=1000000",{cache:"no-store"});
    const sec=(performance.now()-start)/1000;
    const mbps=(1/sec).toFixed(2);
    return mbps+" Mbps（簡易）";
  }catch(e){
    return "測定不可";
  }
}

// DoH推定
async function checkDoH(){
  try{
    const r=await fetch("https://cloudflare-dns.com/dns-query?name=example.com&type=A",{
      method:"GET",
      headers:{ "accept":"application/dns-json" }
    });
    if(r.ok) return "DoH 有効の可能性高い";
    return "DoH 無効の可能性";
  }catch(e){
    return "DoH 無効の可能性";
  }
}

// uBlock間接判定
async function checkUblock(){
  return new Promise(resolve=>{
    const iframe=document.createElement("iframe");
    iframe.style.display="none";
    iframe.src="https://ads.example.com/banner.js"; // 広告っぽいURL
    document.body.appendChild(iframe);

    setTimeout(()=>{
      if(!iframe.contentWindow || iframe.contentWindow.length===0){
        resolve("uBlock Origin が動作している可能性が高い");
      }else{
        resolve("uBlock が無効 or 例外設定の可能性");
      }
      iframe.remove();
    },800);
  });
}

// Edge設定推定
async function checkEdgeSettings(){
  let cookieTest="不明";
  try{
    document.cookie="test=1; SameSite=None; Secure";
    cookieTest=document.cookie.includes("test=")?"Cookie許可":"Cookie制限あり";
  }catch(e){
    cookieTest="Cookie制限あり";
  }
  return cookieTest;
}

// 総合診断
async function runAll(){
  const out=document.getElementById("result");
  out.innerHTML="診断中…";

  const webrtc=await checkWebRTC();
  const speed=await checkSpeed();
  const doh=await checkDoH();
  const ublock=await checkUblock();
  const edge=await checkEdgeSettings();

  const ua=navigator.userAgent;
  const https=location.protocol==="https:";
  const cpu=navigator.hardwareConcurrency;
  const ram=navigator.deviceMemory||"不明";

  out.innerHTML=`
    ${https?badge("HTTPS: OK","ok"):badge("HTTPS: 非HTTPS","warn")}
    ${badge("UA: "+ua,"mid")}
    ${badge("CPUスレッド: "+cpu,"mid")}
    ${badge("RAM: "+ram+"GB","mid")}
    ${badge("WebRTC Local IP: "+webrtc.local,"mid")}
    ${badge("通信速度: "+speed,"mid")}
    ${badge("DoH推定: "+doh,"mid")}
    ${badge("uBlock判定: "+ublock,"mid")}
    ${badge("Edge設定推定: "+edge,"mid")}
  `;
}
</script>

</div>
</body>
</html>
